#
# Please note not all available settings / options are set here.
# For a full list, see the wiki
#

#autogenerated = 1 # remove this line to remove the warning

# Autostarts
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
#exec-once = ~/.config/scripts/portal &
exec-once = wl-clip-persist --clipboard regular &
exec-once = ~/.config/scripts/autolock &
exec-once = ~/.config/scripts/offmonitor &
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1 &
exec-once = swaybg -i/home/lameiro0x/Pictures/fondos/4.jpg -m fill &
exec-once = waybar &
#exec-once = ~/.screenlayout/main.sh &
exec-once = wlsunset -T 5000
exec-once = ~/cu
exec-once = dunst &
exec-once = mpd

# See https://wiki.hyprland.org/Configuring/Monitors/
# Pantalla 1 - 144 Hz
monitor=eDP-1, 1920x1080@60, 0x0,1


#workspace= 2, HDMI-A-2
#workspace= 3, HDMI-A-1
#monitor=DP-3,1920x1080@75,0x0,1
#monitor=DP-2,1920x1080@75,1920x0,1
#workspace=DP-3,1
#workspace=DP-2,2
#workspace=DP-2,3
#workspace=DP-2,4
#workspace=DP-2,5
#workspace=DP-2,6


# See https://wiki.hyprland.org/Configuring/Keywords/ for more

# Execute your favorite apps at launch
# exec-once = waybar & hyprpaper & firefox

# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf

# Some default env vars.
env = XCURSOR_SIZE,14
env = WLR_NO_HARDWARE_CURSORS,1
env = QT_QPA_PLATFORM,wayland
#env = WLR_RENDERER_ALLOW_SOFTWARE,1

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = us
    kb_variant = 
    kb_model = pc105
    kb_options = ctrl:nocaps
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = no
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 5
    gaps_out = 15
    border_size = 1
    #col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.active_border = rgb(99999A)
    col.inactive_border = rgb(99999a)

    layout = dwindle
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 10
    #blur = yes
    #blur_size = 1
   # blur_passes = 3
    #blur_new_optimizations = on

    drop_shadow = yes
    shadow_range = 15
    shadow_render_power = 2
    col.shadow = 0x66000000
    #col.shadow = rgb(bd93f9)
    #col.shadow_inactive = rgb(11111B)
    #blurls = waybar
}

animations {
    enabled = yes

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    #new_is_master = true
}

gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    workspace_swipe = off
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#executing for more
device:epic-mouse-v1 {
    #sensitivity = -0.5
}

# Example windowrule v1
# windowrule = float, ^(kitty)$
# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more

# Rules
windowrulev2 = opacity 0.9 0.9,class:^(alacritty)$
windowrulev2 = opacity 0.9 0.9,class:^(kitty)$
windowrulev2 = opacity 1 1,initialclass:(Code),initialTitle:(Visual Studio Code)
windowrulev2 = opacity 0.8 0.75,initialclass:(dolphin),initialTitle:(linux — Dolphin)
windowrulev2 = opacity 0.8 0.75,initialclass:(Wofi),initialTitle:(Wofi)
windowrulev2 = opacity 0.0 override 0.0 override,class:^(xwaylandvideobridge)$
windowrulev2 = noanim,class:^(xwaylandvideobridge)$
windowrulev2 = nofocus,class:^(xwaylandvideobridge)$
windowrulev2 = noinitialfocus,class:^(xwaylandvideobridge)$
windowrulev2 = workspace 5,class:(kitty),title:(cava)
windowrulev2 = workspace 5,class:(kitty),title:(ncmpcpp)
windowrulev2 = float, class:(discord),title:(Amigos - Discord)
windowrule= opacity .95 0.8,^(Code)$
windowrule = float, ^(mpv)$
windowrule = center, ^(mpv)$
windowrule = size 65% 75%, ^(mpv)$

windowrule = float, ^(VirtualBox Manager)$
windowrule = size 65% 65%, ^(VirtualBox Manager)$
windowrule = center, ^(VirtualBox Manager)$

windowrule = float, ^(VirtualBox Machine)$
windowrule = size 65% 75%, ^(VirtualBox Machine)$

windowrule = float, ^(xed)$
windowrule = size 65% 65%, ^(xed)$
windowrule = center, ^(xed)$

windowrule = float, ^(pavucontrol)$
windowrule = size 45% 65%, ^(pavucontrol)$
windowrule = center, ^(pavucontrol)$

windowrule = float, ^(xviewer)$
windowrule = size 65% 65%, ^(xviewer)$
windowrule = center, ^(xviewer)$

windowrule = float, ^(nwg-look)$
windowrule = size 65% 65%, ^(nwg-look)$
windowrule = center, ^(nwg-look)$

windowrule = float, ^(Vmware)$
# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER
$kitty = /home/lameiro0x/.local/bin/kitty

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more6;9
# ── Manejo de ventanas ──────────────────────────────────
bind = $mainMod, F, fullscreen,
bind = $mainMod, V, togglefloating,
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = CTRL, Q, killactive,
bind = $mainMod SHIFT, E, exit,

# ── Terminal y lanzador ─────────────────────────────────
bind = CTRL, RETURN, exec, $kitty
bind = CTRL, SPACE, exec, wofi --show drun

# ── Capturas de pantalla ────────────────────────────────
# Pantalla completa -> ~/Pictures
bind = , PRINT, exec, grim ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png
# Selección de área (slurp) -> ~/Pictures
bind = SHIFT, PRINT, exec, grim -g "$(slurp)" ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png
# Selección de área -> portapapeles
bind = CTRL SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy

# ── Redimensionar ventana activa (±40) ──────────────────
binde = CTRL SHIFT, H, resizeactive, -40 0
binde = CTRL SHIFT, L, resizeactive, 40 0
binde = CTRL SHIFT, K, resizeactive, 0 -40
binde = CTRL SHIFT, J, resizeactive, 0 40

# ── Mover ventana (Ctrl + Super + HJKL) ─────────────────
bind = $mainMod CTRL, H, movewindow, l
bind = $mainMod CTRL, L, movewindow, r
bind = $mainMod CTRL, K, movewindow, u
bind = $mainMod CTRL, J, movewindow, d

# ── Foco entre ventanas (Ctrl + HJKL) ───────────────────
bind = CTRL, H, movefocus, l
bind = CTRL, L, movefocus, r
bind = CTRL, K, movefocus, u
bind = CTRL, J, movefocus, d

# ── Workspaces ──────────────────────────────────────────
bind = CTRL, Left, workspace, -1
bind = CTRL, Right, workspace, +1

# Ir al workspace 1-5  (Ctrl + 1..5)
bind = CTRL, code:10, workspace, 1
bind = CTRL, code:11, workspace, 2
bind = CTRL, code:12, workspace, 3
bind = CTRL, code:13, workspace, 4
bind = CTRL, code:14, workspace, 5

# Mover ventana al workspace 1-5  (Ctrl + Shift + 1..5)
bind = CTRL SHIFT, code:10, movetoworkspace, 1
bind = CTRL SHIFT, code:11, movetoworkspace, 2
bind = CTRL SHIFT, code:12, movetoworkspace, 3
bind = CTRL SHIFT, code:13, movetoworkspace, 4
bind = CTRL SHIFT, code:14, movetoworkspace, 5

# Workspace especial (extra, no estaba en la lista)
bind = $mainMod SHIFT, U, movetoworkspace, special
bind = $mainMod, U, togglespecialworkspace,

# ── Ratón (con Super) ───────────────────────────────────
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# audio keywords
bind = $mainMod, F2,exec, amixer -q -D pulse sset Master 10%-
  
bind = $mainMod, F3, exec, amixer -q -D pulse sset Master 10%+
bind = $mainMod, F4, exec, amixer -q -D pulse sset Master toggle

bind = $mainMod, F7, exec, ~/.config/scripts/volume playpause

# reload waybar
bind = $mainMod SHIFT, B, exec, killall -SIGUSR2 waybar
#meu
bind = SHIFT ALT, C, exec, kcalc
bind = SHIFT ALT, B, exec, brave
bind = $mainMod SHIFT, Q, exec,hyprctl kill
bind = SHIFT ALT, G, exec, mousepad
bind = SHIFT ALT, N, exec, dolphin
bind = $mainMod, F1, exec,  $kitty ncmpcpp | $kitty cava
bind = SHIFT ALT, V, exec, code
bind = SHIFT ALT, R, exec, $kitty ranger
bind = SHIFT ALT, T, exec, $kitty trans :pt -I
bind = SHIFT ALT, P, exec, pamac-manager
bind = SUPER, H, exec, killall waybar || waybar
bind = SHIFT ALT, A, exec, killall mpvpaper
bind = SHIFT ALT, S, exec, mpvpaper HDMI-A-1 -o "loop-playlist" ~/Videos/sonic &
bind = SHIFT ALT, M, exec, flatpak run app/net.ankiweb.Anki/x86_64/stable
bind = SHIFT ALT, I, exec, chat-gpt
