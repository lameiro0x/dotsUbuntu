# Kitty config — réplica estética de Alacritty (tema Gruvbox "wombat")
# El blur y las sombras los aplica Hyprland (compositor), no la terminal.

# ── Fuente ──────────────────────────────────────────────
font_family      FiraCode Nerd Font
font_size        12.0

# ── Ventana ─────────────────────────────────────────────
# Alacritty: opacity 0.73 + regla Hyprland opacity 0.9 -> mismo valor aquí.
background_opacity      0.73
hide_window_decorations yes
# Alacritty padding x=18 y=16  ->  kitty: vertical horizontal
window_padding_width    16 18
confirm_os_window_close 0

# ── Cursor: parpadeo (blink) + estela (trail) ───────────
cursor_shape                 block
cursor_blink_interval        0.5
cursor_stop_blinking_after   0
cursor_trail                 1
cursor_trail_decay           0.2 0.8
cursor_trail_start_threshold 0

# ── Colores (Gruvbox Dark personalizado / wombat.toml) ──
foreground  #ebdbb2
background  #1d2021

# normal
color0 #282828
color1 #cc241d
color2 #98971a
color3 #d79921
color4 #458588
color5 #b16286
color6 #689d6a
color7 #a89984

# bright
color8  #928374
color9  #fb4934
color10 #b8bb26
color11 #fabd2f
color12 #83a598
color13 #d3869b
color14 #8ec07c
color15 #ebdbb2

# ── Teclado: Shift+Enter envía ESC + CR (igual que Alacritty) ──
map shift+enter send_text all \x1b\r
